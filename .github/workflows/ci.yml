name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run Pyright
        run: pyright .

      - name: Run pytest with coverage
        run: pytest --cov=src/find_unencrypted_keys --cov-report=term-missing --cov-fail-under=85

      - name: Build distributions
        run: python -m build

      - name: Smoke-test standalone executable
        run: bash scripts/smoke_test_executable.sh
