# Broad but controlled discovery model.
#
# base_folders: the ancestor trees you authorize the scanner to explore.
#   Use broad entries like ".", specific project roots, or "~/.config".
#   The scanner will walk these (pruned) and apply filename_patterns anywhere underneath.
#
# directory_names: common names of directories that typically hold private key material.
#   These are automatically discovered (promoted) at any depth under your base_folders.
#
# ignore_directories: basenames of directories never descended into (exact match).
#   Omit this key to use the packaged default list below.
#   Set to [] to disable all directory pruning.
#   When present with entries, ONLY those names apply (replace semantics).
#   To extend defaults, copy this list into your config and add entries.
#
# ignore_filename_patterns: basename globs skipped before key assessment (ignore wins
#   over filename_patterns). Omit for packaged defaults; [] disables; non-empty
#   replaces defaults (same rules as ignore_directories).
#
# filename_patterns select candidate files inside authorized trees.
#   Includes *.properties so Java-style property files are inspected for secrets.
#
# property_name_patterns: case-insensitive substrings of property keys (in
#   *.properties files) that mark a property as secret-bearing (for example
#   password, secret, private). Matching keys are checked for plaintext
#   credentials, inline key material, and unprotected key-file references.
#   Omit for packaged defaults; [] disables property-name matching; non-empty
#   replaces defaults (same omit/empty/replace rules as the ignore_* keys).
#
# Findings: canonical paths on stdout only. A property-level finding is rendered
#   as <path>#<property key>; secret values are never printed.
# Summaries + remediation on stderr.
[scan]
base_folders = [
  ".",
]

directory_names = [
  ".ssh", "ssh",
  "secrets", "keys", "private",
  "certs", "certificates", "tls", "ssl", "pki",
  "deploy", "deployment", "infra",
  "ansible", "terraform",
  "docker", "helm", "k8s", "kubernetes",
  "vpn", "openvpn", "wireguard",
  "Docs", "OneDrive", "Insync",
  "gnupg", "private-keys-v1.d",
  "JetBrains", "PyCharm", "Cursor", "Code",
  "History",
]

ignore_directories = [
  # Version control
  ".git", ".svn", ".hg",
  # Dependencies and package install trees
  "node_modules", "bower_components", "vendor",
  ".npm", ".yarn", ".pnpm-store",
  # Python / virtual environments
  ".venv", "venv", "env",
  # Build output
  "target", "dist", "build", "out",
  # Caches
  "__pycache__", ".pytest_cache", ".mypy_cache", ".ruff_cache",
  ".coverage", "coverage", ".cache", ".turbo", ".gradle",
  # IDE / editor metadata
  ".idea", ".vscode", ".vs",
  # Temporary directories
  "tmp", "temp", ".tmp",
  # Note: ".env" here is a directory name, not .env files
  ".env",
]

ignore_filename_patterns = [
  # Public-only artifacts
  "*.pub", "authorized_keys", "known_hosts",
  # Certificate-only outputs
  "*.crt", "*.cer", "*.csr",
  # Unsupported keystore families
  "*.p12", "*.pfx", "*.jks", "*.keystore", "*.der", "*.pk8",
  # Cache artifacts
  "*.cache", "*.pyc",
  # Package-manager artifacts
  "package-lock.json", "yarn.lock", "pnpm-lock.yaml",
  "*.whl", "*.egg", "Cargo.lock", "go.sum",
]

# max_directory_visits = 100000

filename_patterns = [
  "id_*",
  "identity",
  "ssh_host_*_key",
  "*.ppk",
  "*.pem",
  "*.key",
  "pycharm.key",
  ".env",
  ".env.*",
  "*.env",
  "*.env.*",
  "*.ovpn",
  "*.tfvars",
  "*.properties",
]

# Property-key substrings (case-insensitive) treated as secret-bearing inside
# *.properties files. Omit for these packaged defaults; [] disables; a non-empty
# list replaces these defaults entirely.
property_name_patterns = [
  "password", "passwd", "pwd", "pass",
  "secret", "private", "passphrase",
  "key", "token", "credential", "apikey",
]